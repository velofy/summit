name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Size budget
        run: npm run size
      - name: Bundle smoke test
        run: npm run smoke
      - name: Docs page verification
        run: npm run verify
      - name: Generate docs
        run: npm run docs
      - name: Docs pages verification
        run: npm run verify:docs
